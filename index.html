<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login Form</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg, #4facfe, #00f2fe);
    }

    .login-box{
      background:#fff;
      padding:40px;
      width:320px;
      border-radius:12px;
      box-shadow:0 10px 25px rgba(0,0,0,0.2);
    }

    .login-box h2{
      text-align:center;
      margin-bottom:25px;
      color:#333;
    }

    .input-box{
      margin-bottom:20px;
    }

    .input-box label{
      display:block;
      margin-bottom:6px;
      color:#555;
      font-size:14px;
    }

    .input-box input{
      width:100%;
      padding:12px;
      border:1px solid #ccc;
      border-radius:8px;
      outline:none;
      transition:0.3s;
    }

    .input-box input:focus{
      border-color:#4facfe;
      box-shadow:0 0 5px rgba(79,172,254,0.5);
    }

    .login-btn{
      width:100%;
      padding:12px;
      border:none;
      border-radius:8px;
      background:#4facfe;
      color:white;
      font-size:16px;
      cursor:pointer;
      transition:0.3s;
    }

    .login-btn:hover{
      background:#00c6fb;
    }

    .extra{
      text-align:center;
      margin-top:15px;
      font-size:14px;
    }

    .extra a{
      color:#4facfe;
      text-decoration:none;
    }
  </style>
</head>
<body>

  <div class="login-box">
    <h2>Login</h2>

    <form>
      <div class="input-box">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>

      <div class="input-box">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>

      <button type="submit" class="login-btn">Login</button>

      <div class="extra">
        <p>Don't have an account? <a href="#">Sign Up</a></p>
      </div>
    </form>
  </div>

</body>
</html>
